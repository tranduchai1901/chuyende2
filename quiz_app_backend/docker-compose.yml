# MySQL + phpMyAdmin — chay: docker compose up -d
# phpMyAdmin: http://localhost:8080 (server: db, user: root, pass: root)
# MySQL: localhost:3306

services:
  db:
    image: mysql:8.0
    container_name: quizmaster-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quizmaster
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    volumes:
      - quizmaster_mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: quizmaster-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  quizmaster_mysql_data:
